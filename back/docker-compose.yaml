services:
  redis-node-1:
    image: redis:7
    container_name: redis-node-1
    ports:
      - "6379:6379"
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --port 6379
    restart: always

  redis-node-2:
    image: redis:7
    container_name: redis-node-2
    ports:
      - "6380:6379"
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --port 6379
    restart: always

  redis-node-3:
    image: redis:7
    container_name: redis-node-3
    ports:
      - "6381:6379"
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --port 6379
    restart: always